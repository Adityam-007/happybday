
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy 34th Birthday Mom</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #ff4d6d; --bg: #0d0d0d; --gold: #d4af37; --wine: #4a0e0e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; }

        .page { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s; z-index: 1; }
        .active { opacity: 1; visibility: visible; z-index: 10; }

        /* --- PAGE 1 --- */
        #page1 { background: radial-gradient(circle at 50% 30%, #2c0b0e 0%, #0d0d0d 100%); }
        .hero-circle { width: 250px; height: 250px; border-radius: 50%; padding: 8px; background: linear-gradient(45deg, var(--gold), var(--accent)); margin-bottom: 20px; }
        .hero-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 3px solid #000; }

        /* --- PAGE 3: THE FIXED LAYOUT --- */
        #page3 { background: #fff5f6; color: #1a1a1a; }
        
        .stage { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        .photo { 
            position: absolute; width: 280px; height: 320px; background: white; padding: 10px 10px 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); opacity: 0; z-index: 5;
            pointer-events: none; transition: 0.8s cubic-bezier(0.17, 0.88, 0.32, 1.2);
        }
        .photo img { width: 100%; height: 100%; object-fit: cover; }
        .photo::after { content: 'Memories'; position: absolute; bottom: 8px; left: 0; width: 100%; text-align: center; font-family: 'Dancing Script'; color: #888; font-size: 1.2rem; }

        .env-wrapper { position: relative; width: 320px; height: 220px; perspective: 1000px; cursor: pointer; z-index: 20; margin-top: 40px; }
        .env-back { position: absolute; width: 100%; height: 100%; background: var(--wine); border-radius: 0 0 10px 10px; border: 2px solid var(--gold); z-index: 10; }
        .env-flap { position: absolute; top: 0; width: 0; height: 0; border-left: 160px solid transparent; border-right: 160px solid transparent; border-top: 120px solid #631212; transform-origin: top; transition: 0.6s; z-index: 15; }
        .letter { position: absolute; bottom: 10px; left: 10px; width: 300px; height: 200px; background: white; padding: 25px; z-index: 11; transition: 0.6s; border-radius: 5px; }

        /* OPEN ANIMATIONS - STAYS ON SCREEN */
        .open .env-flap { transform: rotateX(180deg); z-index: 5; }
        .open .letter { transform: translateY(-160px); }
        /* Photos fan out but stay visible */
        .open .p1 { opacity: 1; transform: translate(-160px, -140px) rotate(-10deg); pointer-events: auto; }
        .open .p2 { opacity: 1; transform: translate(160px, -140px) rotate(10deg); pointer-events: auto; }

        .btn { padding: 14px 35px; background: var(--accent); border: none; color: white; border-radius: 50px; font-weight: 600; cursor: pointer; z-index: 50; }
        .replay { position: absolute; bottom: 40px; background: #333; }
    </style>
</head>
<body>

    <div class="page active" id="page1">
        <div class="hero-circle"><img id="hero-img" src=""></div>
        <h1 style="font-family:'Playfair Display'; font-size: 3.5rem; margin:0;">HAPPY <span style="color:var(--gold)">34th</span></h1>
        <button class="btn" onclick="go(2)">NEXT →</button>
    </div>

    <div class="page" id="page2" style="background:#000">
        <h2 style="font-family:'Playfair Display'; font-size: 2.2rem; padding: 20px;">The World Got Luckier Since May 27</h2>
        <button class="btn" onclick="go(3)">OPEN SURPRISE →</button>
    </div>

    <div class="page" id="page3">
        <div class="stage">
            <div class="env-wrapper" id="env" onclick="this.classList.toggle('open')">
                <div class="photo p1"><img id="img1" src=""></div>
                <div class="photo p2"><img id="img2" src=""></div>
                
                <div class="env-flap"></div>
                <div class="letter">
                    <h3 style="font-family:'Dancing Script'; color:var(--accent); margin:0;">Dear Mom,</h3>
                    <p style="font-size: 0.9rem;">You are the heart of our home. Happy 34th Birthday! ❤️</p>
                </div>
                <div class="env-back"></div>
            </div>
            <button class="btn replay" onclick="go(1)">REPLAY</button>
        </div>
    </div>

    <script>
        // --- PASTE CODES HERE ---
        const photo_hero = "PASTE_HERE"; 
        const photo_1    = "PASTE_HERE";
        const photo_2    = "PASTE_HERE";

        function clean(str) {
            if (!str || str.length < 10) return "https://via.placeholder.com/400";
            if (str.includes('url("')) return str.split('url("')[1].split('")')[0];
            if (str.includes('url(')) return str.split('url(')[1].split(')')[0];
            return str.trim();
        }

        window.onload = () => {
            document.getElementById('hero-img').src = clean(photo_hero);
            document.getElementById('img1').src = clean(photo_1);
            document.getElementById('img2').src = clean(photo_2);
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        };

        function go(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page'+n).classList.add('active');
            if(n===1) {
                document.getElementById('env').classList.remove('open');
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            }
        }
    </script>
</body>
</html>
