<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Mom ❤️</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .page {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: transform 0.8s ease, opacity 0.8s;
  }

  .hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateX(100%);
  }

  /* COLOR PALETTE */
  .page1 { background: linear-gradient(135deg, #ff758c, #ffb199); }
  .page2 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
  .page3 { background: linear-gradient(135deg, #fddb92, #d1fdff); }

  h1 {
    color: white;
    font-size: 3em;
    text-align: center;

    /* ✅ ONLY ADDED ANIMATION */
    opacity: 0;
    transform: translateY(30px);
    animation: fadeSlide 1s ease forwards;
  }

  @keyframes fadeSlide {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.1);
  }

  /* GIFT BOX */
  .gift-box {
    width: 220px;
    height: 220px;
    background: linear-gradient(145deg, #ff4d6d, #ff758f);
    border-radius: 15px;
    position: relative;
    cursor: pointer;
    animation: float 2s infinite ease-in-out;
  }

  .gift-box::before {
    content: '';
    position: absolute;
    width: 30px;
    height: 100%;
    background: gold;
    left: 50%;
    transform: translateX(-50%);
  }

  .gift-box::after {
    content: '';
    position: absolute;
    height: 30px;
    width: 100%;
    background: gold;
    top: 50%;
    transform: translateY(-50%);
  }

  .lid {
    position: absolute;
    width: 240px;
    height: 60px;
    background: #ff758f;
    top: -60px;
    left: -10px;
    border-radius: 10px;
    transition: 0.6s;
  }

  .open .lid {
    transform: rotate(-35deg) translateY(-20px);
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  /* HEARTS */
  .heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: floatUp 4s linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
  }

</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page page1" id="page1">
  <h1>🎉 Happy Birthday Mom 🎂</h1>
  <button onclick="nextPage(1)">Start Surprise 💖</button>
</div>

<!-- PAGE 2 -->
<div class="page page2 hidden" id="page2">
  <h1>Click the Gift 🎁</h1>
  <div class="gift-box" onclick="openGift(this)">
    <div class="lid"></div>
  </div>
  <button onclick="nextPage(2)" id="nextBtn" style="display:none">Next ➡️</button>
</div>

<!-- PAGE 3 -->
<div class="page page3 hidden" id="page3">
  <h1 id="finalMsg">You are my world Mom 💕<br>I love you forever 🌸</h1>
</div>

<script>
function nextPage(page) {
  document.getElementById('page' + page).classList.add('hidden');
  document.getElementById('page' + (page + 1)).classList.remove('hidden');
}

function openGift(box) {
  box.classList.add('open');
  createHearts();
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function createHearts() {
  for (let i = 0; i < 20; i++) {
    let heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = '❤️';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (15 + Math.random()*20) + 'px';
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
  }
}
</script>

</body>
</html>
