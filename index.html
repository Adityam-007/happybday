<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HBD Mom | Memory Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #ff4d6d; --bg: #0d0d0d; --gold: #d4af37; --glass: rgba(255, 255, 255, 0.05); }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; }

        .page {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; text-align: center;
        }
        .active { opacity: 1; visibility: visible; }

        /* --- PAGE 1: AUTO-庆祝 HERO --- */
        #page1 { background: radial-gradient(circle at 50% 30%, #2c0b0e 0%, #0d0d0d 100%); perspective: 1000px; }
        #bokeh-container { position: absolute; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .particle { position: absolute; background: rgba(255, 77, 109, 0.1); border-radius: 50%; pointer-events: none; }
        
        .image-circle {
            position: relative;
            width: 70vw; height: 70vw; max-width: 280px; max-height: 280px;
            border-radius: 50%; padding: 8px;
            background: linear-gradient(45deg, var(--gold), transparent, var(--accent));
            box-shadow: 0 0 40px rgba(255, 77, 109, 0.3);
            margin-bottom: 30px; z-index: 5;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(2deg); } }
        .image-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 3px solid #000; }
        
        .hero-text { z-index: 5; }
        .hero-text h2 { font-family: 'Dancing Script'; font-size: 1.8rem; color: var(--accent); margin: 0; }
        .hero-text h1 { font-family: 'Playfair Display'; font-size: 12vw; margin: 0; line-height: 1; letter-spacing: -2px; }
        .shimmer {
            background: linear-gradient(90deg, #d4af37, #fff, #d4af37); background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite; display: block; font-size: 3.5rem; cursor: pointer;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- PAGE 2: HEART TREE --- */
        #page2 { background: #050505; }
        #treeCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .tree-msg { z-index: 10; }

        /* --- PAGE 3: LUXURY ENVELOPE + 3D MEMORIES --- */
        #page3 { background: #fff5f6; color: #1a1a1a; perspective: 1000px; }
        
        /* The Envelope */
        .envelope-container {
            position: relative; width: 300px; height: 200px;
            cursor: pointer; perspective: 1500px; z-index: 10; margin-top: -50px;
        }
        .env-paper {
            position: absolute; width: 100%; height: 100%;
            background: #d44d5c; border-radius: 0 0 10px 10px;
            z-index: 2; box-shadow: 0 15px 35px rgba(212, 77, 92, 0.3);
        }
        .env-flap {
            position: absolute; top: 0; width: 0; height: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-top: 115px solid #b83b48;
            transform-origin: top; transition: 0.6s ease-in-out; z-index: 5;
        }
        .letter {
            position: absolute; bottom: 5px; left: 10px; width: 280px; height: 180px;
            background: white; padding: 25px; border-radius: 5px; z-index: 3;
            transition: transform 0.8s 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; justify-content: center;
        }
        .letter h3 { font-family: 'Dancing Script'; font-size: 1.8rem; color: var(--accent); margin: 0; }
        .letter p { font-size: 1.1rem; color: #444; line-height: 1.4; margin: 10px 0; font-weight: 500; }

        .envelope-container.open .env-flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-container.open .letter { transform: translateY(-140px); }

        /* The Memories Cascade */
        .memory-track { position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 5; }
        .memory-card {
            position: absolute; width: 120px; height: 160px;
            border-radius: 10px; border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden; opacity: 0;
            transition: opacity 1s, transform 6s;
        }
        .memory-card.reveal { opacity: 0.8; }
        .memory-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Position variations for 3 photos on Page 3 */
        .mem1 { top: 10vh; left: 10vw; transform: rotate(-10deg); }
        .mem2 { bottom: 15vh; right: 10vw; transform: rotate(15deg); }
        .mem3 { top: 20vh; right: 20vw; transform: rotate(5deg); }

        /* BUTTONS */
        .btn {
            margin-top: 50px; padding: 16px 45px; background: var(--accent);
            border: none; color: white; border-radius: 50px;
            font-weight: 600; font-size: 0.8rem; letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3); cursor: pointer; z-index: 15;
        }
        .hint { margin-top: 25px; font-size: 0.7rem; letter-spacing: 2px; color: #888; text-transform: uppercase; z-index: 15;}
    </style>
</head>
<body>

    <div class="page active" id="page1">
        <div id="bokeh-container"></div>
        <div class="image-circle">
            <img src="mom-photo.png" alt="Mom" onerror="this.src='https://via.placeholder.com/300x300?text=Mom'">
        </div>
        <div class="hero-text">
            <h2 id="greet">Dearest Mom</h2>
            <h1 id="main-title">HAPPY <span class="shimmer" onclick="burst()">34th</span></h1>
            <p id="sub-text" style="letter-spacing: 4px; opacity: 0.6; margin-top: 10px;">BIRTHDAY CELEBRATION</p>
        </div>
        <button class="btn" id="start-btn" onclick="go(2)">THE SURPRISE →</button>
    </div>

    <div class="page" id="page2">
        <canvas id="treeCanvas"></canvas>
        <div class="tree-msg">
            <h2 style="font-family: 'Playfair Display';">The World Got Luckier</h2>
            <p style="color: var(--accent); letter-spacing: 4px; font-weight: 600;">SINCE MAY 27</p>
            <button class="btn" onclick="go(3)" style="background: white; color: black;">OPEN MY HEART →</button>
        </div>
    </div>

    <div class="page" id="page3">
        <div class="memory-track" id="mem-track">
            <div class="memory-card mem1"><img src="mem1.jpeg" alt="Memory 1" onerror="this.src='https://via.placeholder.com/120x160?text=Memory1'"></div>
            <div class="memory-card mem2"><img src="mem2.jpeg" alt="Memory 2" onerror="this.src='https://via.placeholder.com/120x160?text=Memory2'"></div>
            <div class="memory-card mem3"><img src="mem3.png" alt="Memory 3" onerror="this.src='https://via.placeholder.com/120x160?text=Memory3'"></div>
        </div>

        <div class="envelope-container" onclick="this.classList.toggle('open')">
            <div class="env-flap"></div>
            <div class="letter">
                <h3>Dear Mom,</h3>
                <p>You make every day feel like a celebration. May your 34th year be as beautiful as you are! ❤️</p>
                <small style="color: var(--accent); font-weight: bold;">I Love You Always!</small>
            </div>
            <div class="env-paper"></div>
        </div>
        <div class="hint">Tap the envelope to open</div>
        <button class="btn" onclick="go(1)" style="background: transparent; border: 1px solid #333; color: #333; margin-top: 180px;">REPLAY</button>
    </div>

    <script>
        // 1. CONFETTI SURPRISE
        function burst() {
            var count = 150;
            var defaults = { origin: { y: 0.8 }, colors: ['#ff4d6d', '#d4af37', '#ffffff'] };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }
            fire(0.25, { spread: 30, startVelocity: 60 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 130, startVelocity: 30, decay: 0.92, scalar: 1.2 });
        }

        // 2. PAGE NAVIGATION
        function go(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            
            // Clean up Page 3 memories
            document.querySelectorAll('.memory-card').forEach(m => m.classList.remove('reveal'));

            if(num === 1) { burst(); setTimeout(burst, 500); }
            if(num === 2) initTree();
            if(num === 3) initMemories();
        }

        // 3. PAGE 1: ENTRANCE & BOKEH
        window.onload = () => {
            // Bokeh generation
            const container = document.getElementById('bokeh-container');
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 50 + 20;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                container.appendChild(p);
                gsap.to(p, { x: "random(-100, 100)", y: "random(-100, 100)", duration: "random(10, 20)", repeat: -1, yoyo: true, ease: "sine.inOut" });
            }

            // Timeline with AUTO-BURST
            const tl = gsap.timeline();
            tl.from(".image-circle", { duration: 1.2, scale: 0, rotate: -180, opacity: 0, ease: "back.out(1.2)" })
              .from("#greet", { duration: 0.6, y: 20, opacity: 0 }, "-=0.4")
              .from("#main-title", { 
                  duration: 0.8, y: 30, opacity: 0, ease: "power4.out",
                  onComplete: () => {
                      burst();
                      setTimeout(burst, 400); // Secondary surge
                  }
              }, "-=0.3")
              .from("#sub-text", { duration: 0.6, opacity: 0 }, "-=0.2")
              .from("#start-btn", { duration: 0.8, scale: 0.8, opacity: 0, ease: "elastic.out(1, 0.5)" }, "-=0.1");
        };

        // 4. PAGE 2: HEART TREE
        function initTree() {
            const canvas = document.getElementById('treeCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const hearts = [];
            class Heart {
                constructor() { this.reset(); this.y = Math.random() * canvas.height; }
                reset() {
                    this.x = canvas.width / 2; this.y = canvas.height * 0.85;
                    this.size = Math.random() * 6 + 2;
                    this.vx = (Math.random() - 0.5) * 5; this.vy = Math.random() * -3 - 1;
                    this.alpha = 1;
                }
                update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.007; if(this.alpha <= 0) this.reset(); }
                draw() { ctx.globalAlpha = this.alpha; ctx.fillStyle = "#ff4d6d"; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
            }
            for(let i=0; i<80; i++) hearts.push(new Heart());
            function animate() {
                ctx.fillStyle = 'rgba(13, 13, 13, 0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                hearts.forEach(h => { h.update(); h.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // 5. PAGE 3: 3D MEMORY CASCADE
        function initMemories() {
            const cards = document.querySelectorAll('.memory-card');
            
            // GSAP Entrance
            gsap.from(cards, {
                duration: 1.5,
                y: 100,
                scale: 0.5,
                rotationX: -45,
                opacity: 0,
                stagger: 0.3, // Delay between each card
                ease: "back.out(1.2)",
                onComplete: () => {
                    cards.forEach(c => c.classList.add('reveal')); // Set final opacity
                    
                    // Slow, zero-gravity floating loop
                    cards.forEach(card => {
                        gsap.to(card, {
                            duration: "random(6, 12)",
                            x: "random(-30, 30)",
                            y: "random(-30, 30)",
                            rotation: "random(-15, 15)",
                            repeat: -1,
                            yoyo: true,
                            ease: "sine.inOut"
                        });
                    });
                }
            });
        }
    </script>
</body>
</html>
