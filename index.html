<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy 34th Birthday Mom</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #ff4d6d; --bg: #0d0d0d; --gold: #d4af37; --wine: #4a0e0e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; }

        .page { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s; }
        .active { opacity: 1; visibility: visible; }

        /* Page 1 */
        #page1 { background: radial-gradient(circle at 50% 30%, #2c0b0e 0%, #0d0d0d 100%); }
        .hero-circle { width: 220px; height: 220px; border-radius: 50%; padding: 5px; background: linear-gradient(45deg, var(--gold), var(--accent)); margin-bottom: 20px; }
        .hero-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        /* Page 3: Mobile Responsive Envelope */
        #page3 { background: #fff5f6; color: #1a1a1a; }
        
        .env-wrapper { 
            position: relative; 
            width: 90vw; max-width: 350px; /* Scaled for mobile */
            height: 220px; 
            perspective: 1200px; 
            cursor: pointer; 
            margin-top: 50px;
        }

        .photo { 
            position: absolute; 
            width: 85vw; height: 85vw; /* Square responsive size */
            max-width: 380px; max-height: 380px; 
            background: white; padding: 10px 10px 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            opacity: 0; left: 50%; top: 50%; 
            transform: translate(-50%, -50%) scale(0.4); 
            transition: 0.8s cubic-bezier(0.17, 0.88, 0.32, 1.2); 
            z-index: 1; 
        }
        .photo img { width: 100%; height: 100%; object-fit: cover; }
        .photo::after { content: 'Best Memory'; position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; font-family: 'Dancing Script'; color: #777; font-size: 1.2rem; }

        .env-back { position: absolute; width: 100%; height: 100%; background: var(--wine); border-radius: 0 0 10px 10px; z-index: 10; border: 2px solid var(--gold); }
        .env-flap { position: absolute; top: 0; width: 0; height: 0; border-left: 45vw solid transparent; border-right: 45vw solid transparent; border-top: 130px solid #631212; transform-origin: top; transition: 0.6s; z-index: 15; }
        
        /* Fixed Flap for desktop */
        @media (min-width: 400px) { .env-flap { border-left: 175px solid transparent; border-right: 175px solid transparent; } }

        .letter { position: absolute; bottom: 10px; left: 5%; width: 90%; height: 190px; background: white; padding: 20px; z-index: 11; transition: 0.7s; box-shadow: 0 0 15px rgba(0,0,0,0.1); }

        /* THE FIX: Photos move based on screen percentage so they never leave the view */
        .open .env-flap { transform: rotateX(180deg); z-index: 5; }
        .open .letter { transform: translateY(-160px) scale(1.05); }
        .open .p1 { opacity: 1; transform: translate(-105%, -110%) rotate(-8deg) scale(0.9); }
        .open .p2 { opacity: 1; transform: translate(5%, -110%) rotate(8deg) scale(0.9); }

        .btn { padding: 15px 30px; background: var(--accent); border: none; color: white; border-radius: 50px; font-weight: 600; cursor: pointer; margin-top: 40px; z-index: 20; }
        .replay-btn { position: absolute; bottom: 30px; background: #333; }
    </style>
</head>
<body>

    <div class="page active" id="page1">
        <div class="hero-circle"><img id="hero-img" src=""></div>
        <h1 style="font-family:'Playfair Display'; font-size: 3rem; margin:0;">HAPPY <span style="color:var(--gold)">34th</span></h1>
        <button class="btn" onclick="go(2)">THE SURPRISE →</button>
    </div>

    <div class="page" id="page2" style="background:#050505">
        <h2 style="font-family:'Playfair Display'; font-size: 2rem; padding: 20px;">The World Got Luckier Since May 27</h2>
        <button class="btn" onclick="go(3)">OPEN SURPRISE →</button>
    </div>

    <div class="page" id="page3">
        <div class="env-wrapper" id="env" onclick="this.classList.toggle('open')">
            <div class="photo p1"><img id="img1" src=""></div>
            <div class="photo p2"><img id="img2" src=""></div>
            <div class="env-flap"></div>
            <div class="letter">
                <h3 style="font-family:'Dancing Script'; color:var(--accent); margin:0; font-size: 1.8rem;">Dear Mom,</h3>
                <p style="font-size: 0.9rem; color: #444;">You make every single day feel like a celebration. Happy Birthday! ❤️</p>
            </div>
            <div class="env-back"></div>
        </div>
        <button class="btn replay-btn" onclick="go(1)">REPLAY STORY</button>
    </div>

    <script>
        // --- 📸 PASTE YOUR CODES BELOW 📸 ---
        const photo_hero = "PASTE_HERE"; 
        const photo_1    = "PASTE_HERE";
        const photo_2    = "PASTE_HERE";

        function clean(str) {
            if (!str || str.length < 20) return "https://via.placeholder.com/400";
            if (str.includes('url("')) return str.split('url("')[1].split('")')[0];
            if (str.includes('url(')) return str.split('url(')[1].split(')')[0];
            return str.trim();
        }

        window.onload = () => {
            document.getElementById('hero-img').src = clean(photo_hero);
            document.getElementById('img1').src = clean(photo_1);
            document.getElementById('img2').src = clean(photo_2);
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
        };

        function go(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page'+n).classList.add('active');
            if(n===1) {
                document.getElementById('env').classList.remove('open');
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
            }
        }
    </script>
</body>
</html>
