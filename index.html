<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>HBD Mom</title>	    
    <link type="text/css" rel="stylesheet" href="./file/default.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="./file/jquery.min.js"></script>
    <script type="text/javascript" src="./file/jscex.min.js"></script>
    <script type="text/javascript" src="./file/jscex-parser.js"></script>
    <script type="text/javascript" src="./file/jscex-jit.js"></script>
    <script type="text/javascript" src="./file/jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="./file/jscex-async.min.js"></script>
    <script type="text/javascript" src="./file/jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="./file/functions.js" charset="utf-8"></script>
    <script type="text/javascript" src="./file/love.js" charset="utf-8"></script>
    
    <style>
        /* VISUALLY APPEALING TEXT STYLING */
        #code {
            display: none;
            font-family: 'Poppins', sans-serif;
            color: #444;
            line-height: 1.8;
            padding-left: 20px;
        }
        
        .say {
            display: block;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Making text significantly bigger */
            font-size: 28px; 
            margin-bottom: 10px;
        }

        /* Special styling for the main birthday wish */
        .highlight {
            font-family: 'Dancing Script', cursive;
            font-size: 45px;
            background: linear-gradient(45deg, #ff4d6d, #f64c72);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        .say.reveal {
            opacity: 1;
            transform: translateX(0);
        }

        #clock-box {
            font-size: 20px;
            color: #ff4d6d;
            font-family: 'Poppins', sans-serif;
            margin-top: 20px;
        }

        #clock {
            font-weight: 600;
            background: rgba(255, 77, 109, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>

    <script>
        function playAudio() {
            var audio = document.getElementById("myAudio");
            if(audio) audio.play();
        }
    </script>
</head>
<body>
    <div id="main">
        <div id="error">Please use <a href="http://www.google.cn/chrome/">Chrome</a> or <a href="http://firefox.com.cn/">Firefox</a></div>
        <audio autoplay="autoplay" id="myAudio">
            <source src="aud.mp3" type="audio/mp3" />
        </audio>
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <span class="say">To the 💞</span>
                    <span class="say">Best Woman 🎈</span>
                    <span class="say">and the Best mother 🍀</span>
                    <span class="say highlight">Wishing you 34th</span>
                    <span class="say highlight">Happy Birthday 💕</span>
                    <span class="say" style="font-size: 22px; margin-top: 20px; font-style: italic; color: #777;">
                        I am lucky to have parents like you
                    </span>
                </div>
            </div>
            <div id="clock-box">
                <span id="clock"></span>
            </div>
            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>
    </div>

    <script>
    (function() {
        var canvas = $('#canvas');
        if (!canvas[0].getContext) {
            $("#error").show();
            return false;
        }

        var width = canvas.width();
        var height = canvas.height();        
        canvas.attr("width", width);
        canvas.attr("height", height);

        var opts = {
            seed: { x: width / 2 - 20, color: "rgb(190, 26, 37)", scale: 2 },
            branch: [
                [535, 680, 570, 250, 500, 200, 30, 100, [
                    [540, 500, 455, 417, 340, 400, 13, 100, [
                        [450, 435, 434, 430, 394, 395, 2, 40]
                    ]],
                    [550, 445, 600, 356, 680, 345, 12, 100, [
                        [578, 400, 648, 409, 661, 426, 3, 80]
                    ]],
                    [539, 281, 537, 248, 534, 217, 3, 40],
                    [546, 397, 413, 247, 328, 244, 9, 80, [
                        [427, 286, 383, 253, 371, 205, 2, 40],
                        [498, 345, 435, 315, 395, 330, 4, 60]
                    ]],
                    [546, 357, 608, 252, 678, 221, 6, 100, [
                        [590, 293, 646, 277, 648, 271, 2, 80]
                    ]]
                ]] 
            ],
            bloom: { num: 700, width: 1080, height: 650 },
            footer: { width: 1200, height: 5, speed: 10 }
        }

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var foot = tree.footer;
        var hold = 1;

        canvas.click(function(e) {
            playAudio();
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            if (seed.hover(x, y)) {
                hold = 0; 
                canvas.unbind("click");
                canvas.unbind("mousemove");
                canvas.removeClass('hand');
            }
        }).mousemove(function(e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            canvas.toggleClass('hand', seed.hover(x, y));
        });

        var seedAnimate = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) { $await(Jscex.Async.sleep(10)); }
            while (seed.canScale()) { seed.scale(0.95); $await(Jscex.Async.sleep(10)); }
            while (seed.canMove()) { seed.move(0, 2); foot.draw(); $await(Jscex.Async.sleep(10)); }
        }));

        var growAnimate = eval(Jscex.compile("async", function () {
            do { tree.grow(); $await(Jscex.Async.sleep(10)); } while (tree.canGrow());
        }));

        var flowAnimate = eval(Jscex.compile("async", function () {
            do { tree.flower(2); $await(Jscex.Async.sleep(10)); } while (tree.canFlower());
        }));

        var moveAnimate = eval(Jscex.compile("async", function () {
            tree.snapshot("p1", 240, 0, 610, 680);
            while (tree.move("p1", 500, 0)) { foot.draw(); $await(Jscex.Async.sleep(10)); }
            foot.draw();
            tree.snapshot("p2", 500, 0, 610, 680);
            canvas.parent().css("background", "url(" + tree.toDataURL('image/png') + ")");
            canvas.css("background", "#ffe");
            $await(Jscex.Async.sleep(300));
            canvas.css("background", "none");
        }));

        // Sequential Reveal Animation
        var textAnimate = eval(Jscex.compile("async", function () {
            $("#code").show();
            var spans = $(".say");
            for (var i = 0; i < spans.length; i++) {
                $(spans[i]).addClass("reveal");
                $await(Jscex.Async.sleep(1000)); // 1 second gap between lines
            }
        }));

        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());
            textAnimate().start();
        }));

        runAsync().start();
    })();
    </script>
</body>
</html>
