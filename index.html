<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy 34th Mom</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --accent: #ff4d6d; --bg: #0d0d0d; --gold: #d4af37; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; }

        .page {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; text-align: center;
        }
        .active { opacity: 1; visibility: visible; }

        /* --- PAGE 1: MODERN MOBILE HERO --- */
        #page1 { background: radial-gradient(circle at 50% 30%, #2c0b0e 0%, #0d0d0d 100%); }
        
        .image-circle {
            position: relative;
            width: 70vw; height: 70vw; max-width: 280px; max-height: 280px;
            border-radius: 50%;
            padding: 8px;
            background: linear-gradient(45deg, var(--gold), transparent, var(--accent));
            box-shadow: 0 0 40px rgba(255, 77, 109, 0.3);
            margin-bottom: 30px;
        }
        .image-circle img { 
            width: 100%; height: 100%; object-fit: cover; border-radius: 50%; 
            border: 3px solid #000;
        }

        .hero-text h2 { font-family: 'Dancing Script'; font-size: 1.8rem; color: var(--accent); margin: 0; }
        .hero-text h1 { font-family: 'Playfair Display'; font-size: 12vw; margin: 0; line-height: 1; letter-spacing: -2px; }
        .hero-text h1 span { font-size: 3rem; display: block; color: var(--gold); font-style: italic; }

        /* --- PAGE 2: HEART TREE (RESPONSIVE) --- */
        #page2 { background: #050505; }
        #treeCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .tree-msg h2 { font-size: 2.2rem; font-family: 'Playfair Display'; margin: 0; }

        /* --- PAGE 3: LUXURY ENVELOPE --- */
        #page3 { background: #fff5f6; color: #1a1a1a; }
        
        .envelope-container {
            position: relative;
            width: 300px; height: 200px;
            cursor: pointer;
            perspective: 1000px;
        }

        .env-paper {
            position: absolute; width: 100%; height: 100%;
            background: #d44d5c; border-radius: 0 0 10px 10px;
            z-index: 2; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* The Opening Flap */
        .env-flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid #b83b48;
            transform-origin: top;
            transition: 0.6s ease-in-out;
            z-index: 5;
        }

        /* The Actual Letter */
        .letter {
            position: absolute; bottom: 5px; left: 10px;
            width: 280px; height: 180px;
            background: white;
            padding: 20px; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            z-index: 3;
            transition: transform 0.8s 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; justify-content: center;
        }
        .letter h3 { font-family: 'Dancing Script'; font-size: 1.8rem; color: var(--accent); margin: 0; }
        .letter p { font-size: 1rem; color: #444; line-height: 1.4; margin: 10px 0; font-weight: 500; }

        .envelope-container.open .env-flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-container.open .letter { transform: translateY(-130px); }

        /* BUTTONS */
        .btn {
            margin-top: 50px; padding: 16px 45px; background: var(--accent);
            border: none; color: white; border-radius: 50px;
            font-weight: 600; font-size: 0.8rem; letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
            cursor: pointer; z-index: 10;
        }

        .hint { margin-top: 20px; font-size: 0.7rem; letter-spacing: 2px; color: #888; text-transform: uppercase; }

    </style>
</head>
<body>

    <div class="page active" id="page1">
        <div class="image-circle">
            <img src="mom-photo.png" alt="Mom" onerror="this.src='https://via.placeholder.com/300x300?text=Mom'">
        </div>
        <div class="hero-text">
            <h2>Dearest Mom</h2>
            <h1>HAPPY<span>34th</span></h1>
            <p style="letter-spacing: 4px; opacity: 0.6; margin-top: 10px;">BIRTHDAY CELEBRATION</p>
        </div>
        <button class="btn" onclick="go(2)">THE SURPRISE →</button>
    </div>

    <div class="page" id="page2">
        <canvas id="treeCanvas"></canvas>
        <div class="tree-msg" style="z-index: 10;">
            <h2>The World Got Luckier</h2>
            <p style="color: var(--accent); letter-spacing: 4px; font-weight: 600;">SINCE MAY 27</p>
            <button class="btn" onclick="go(3)" style="background: white; color: black;">OPEN MY HEART →</button>
        </div>
    </div>

    <div class="page" id="page3">
        <div class="envelope-container" onclick="this.classList.toggle('open')">
            <div class="env-flap"></div>
            <div class="letter">
                <h3>Dear Mom,</h3>
                <p>You make every day feel like a celebration. May your 34th year be as beautiful as you are! ❤️</p>
                <small style="color: var(--accent); font-weight: bold;">I Love You!</small>
            </div>
            <div class="env-paper"></div>
        </div>
        <div class="hint">Tap the envelope to open</div>
        <button class="btn" onclick="go(1)" style="background: transparent; border: 1px solid #333; color: #333; margin-top: 150px;">REPLAY</button>
    </div>

    <script>
        function go(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            if(num === 2) initTree();
        }

        function initTree() {
            const canvas = document.getElementById('treeCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            class Heart {
                constructor() {
                    this.reset();
                    this.y = Math.random() * canvas.height;
                }
                reset() {
                    this.x = canvas.width / 2;
                    this.y = canvas.height * 0.85;
                    this.size = Math.random() * 6 + 2;
                    this.speedX = (Math.random() - 0.5) * 5;
                    this.speedY = Math.random() * -3 - 1;
                    this.alpha = 1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.alpha -= 0.007;
                    if(this.alpha <= 0) this.reset();
                }
                draw() {
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = "#ff4d6d";
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for(let i=0; i<100; i++) particles.push(new Heart());

            function animate() {
                ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Entrance GSAP
        gsap.from(".image-circle", { duration: 1.5, scale: 0.5, opacity: 0, ease: "back.out(1.7)" });
        gsap.from(".hero-text h1", { duration: 1, y: 30, opacity: 0, delay: 0.5 });
    </script>
</body>
</html>
