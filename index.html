<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy 34th Birthday Mom</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --accent: #ff4d6d; 
            --bg: #0d0d0d; 
            --gold: #d4af37; 
            --wine: #4a0e0e;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; }

        .page {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; text-align: center;
        }
        .active { opacity: 1; visibility: visible; }

        /* --- PAGE 1 --- */
        #page1 { background: radial-gradient(circle at 50% 30%, #2c0b0e 0%, #0d0d0d 100%); }
        #bokeh-container { position: absolute; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .particle { position: absolute; background: rgba(255, 77, 109, 0.1); border-radius: 50%; pointer-events: none; }

        .image-circle {
            position: relative;
            width: 400px; height: 400px; /* FIXED 400x400 */
            border-radius: 50%; padding: 10px;
            background: linear-gradient(45deg, var(--gold), transparent, var(--accent));
            box-shadow: 0 0 50px rgba(255, 77, 109, 0.4);
            margin-bottom: 30px; z-index: 5;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        .image-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 4px solid #000; }

        .hero-text { z-index: 5; }
        .hero-text h2 { font-family: 'Dancing Script'; font-size: 2.2rem; color: var(--accent); margin: 0; }
        .hero-text h1 { font-family: 'Playfair Display'; font-size: 5rem; margin: 0; line-height: 1; letter-spacing: -2px; }
        
        .shimmer {
            background: linear-gradient(90deg, #d4af37, #fff, #d4af37);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            display: block; font-size: 4rem;
            cursor: pointer;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- PAGE 2 --- */
        #page2 { background: #050505; }
        #treeCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .tree-msg { z-index: 10; }

        /* --- PAGE 3: MASSIVE ENVELOPE & 400px PHOTOS --- */
        #page3 { background: radial-gradient(circle, #fff5f6 0%, #ffe0e5 100%); color: #1a1a1a; overflow: hidden; }

        .envelope-wrapper {
            position: relative; width: 450px; height: 300px; 
            perspective: 2000px; z-index: 10; margin-top: 80px;
        }

        .photo-card {
            position: absolute; 
            width: 400px; height: 400px; /* UPDATED TO 400x400 */
            background: white; padding: 15px 15px 50px 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border-radius: 4px; z-index: 1;
            opacity: 0; transform: translate(-50%, 50%) scale(0.5);
            left: 50%; top: 0;
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; border: 1px solid #ddd; }
        .photo-card::after { 
            content: 'Our Favorite Memory'; position: absolute; bottom: 12px; left: 0; width: 100%; 
            text-align: center; font-family: 'Dancing Script'; color: #555; font-size: 1.8rem;
        }

        .env-back {
            position: absolute; width: 100%; height: 100%;
            background: var(--wine); border-radius: 0 0 15px 15px;
            border: 3px solid var(--gold); z-index: 2;
            box-shadow: 0 30px 70px rgba(0,0,0,0.4);
        }

        .env-flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 225px solid transparent; border-right: 225px solid transparent;
            border-top: 180px solid #631212;
            transform-origin: top; transition: 0.8s ease-in-out; z-index: 8;
        }

        .letter {
            position: absolute; bottom: 15px; left: 25px;
            width: 400px; height: 260px; background: #fffdf5;
            padding: 40px; border-radius: 5px; z-index: 5;
            transition: transform 0.8s 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }
        .letter h3 { font-family: 'Dancing Script'; font-size: 2.5rem; color: var(--accent); margin: 0; }
        .letter p { font-size: 1.3rem; line-height: 1.5; color: #333; margin-top: 10px; }

        /* Animation States */
        .envelope-wrapper.open .env-flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-wrapper.open .letter { transform: translateY(-240px) scale(1.05); }
        .envelope-wrapper.open .p1 { opacity: 1; transform: translate(-420px, -200px) rotate(-12deg) scale(1); }
        .envelope-wrapper.open .p2 { opacity: 1; transform: translate(20px, -200px) rotate(12deg) scale(1); }

        .btn {
            margin-top: 60px; padding: 20px 60px; background: var(--accent);
            border: none; color: white; border-radius: 50px;
            font-weight: 700; font-size: 1rem; letter-spacing: 3px;
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.4); cursor: pointer; z-index: 15;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="page active" id="page1">
        <div id="bokeh-container"></div>
        <div class="image-circle">
            <img src="" alt="Mom" id="hero-img">
        </div>
        <div class="hero-text">
            <h2 id="greet">Dearest Mom</h2>
            <h1 id="main-title">HAPPY <span class="shimmer" onclick="burst()">34th</span></h1>
            <p id="sub-text" style="letter-spacing: 6px; opacity: 0.6; margin-top: 15px; font-weight: 600;">BIRTHDAY CELEBRATION</p>
        </div>
        <button class="btn" id="start-btn" onclick="go(2)">THE SURPRISE →</button>
    </div>

    <div class="page" id="page2">
        <canvas id="treeCanvas"></canvas>
        <div class="tree-msg">
            <h2 style="font-family: 'Playfair Display'; font-size: 3.5rem;">The World Got Luckier</h2>
            <p style="color: var(--accent); letter-spacing: 5px; font-weight: 600; font-size: 1.2rem;">SINCE MAY 27</p>
            <button class="btn" onclick="go(3)" style="background: white; color: black;">OPEN MY HEART →</button>
        </div>
    </div>

    <div class="page" id="page3">
        <div class="envelope-wrapper" id="envWrap" onclick="this.classList.toggle('open')">
            <div class="photo-card p1"><img id="photo1" src=""></div>
            <div class="photo-card p2"><img id="photo2" src=""></div>

            <div class="env-flap"></div>
            <div class="letter">
                <h3>Dear Mom,</h3>
                <p>You make every single day feel like a celebration. May your 34th year be as bright and beautiful as your smile! ❤️</p>
                <small style="color: var(--accent); font-weight: bold; font-size: 1.2rem; display: block; margin-top: 15px;">I Love You Always!</small>
            </div>
            <div class="env-back"></div>
        </div>
        
        <button class="btn" onclick="go(1)" style="background: transparent; border: 2px solid #333; color: #333; margin-top: 300px;">REPLAY JOURNEY</button>
    </div>

    <script>
        // --- 📸 PASTE YOUR BASE64 DATA URI STRINGS HERE 📸 ---
        const base64_hero = "PASTE_YOUR_MOM_PHOTO_DATA_URI_HERE";
        const base64_p1   = "PASTE_YOUR_MEMORY_PHOTO_1_DATA_URI_HERE";
        const base64_p2   = "PASTE_YOUR_MEMORY_PHOTO_2_DATA_URI_HERE";

        function fix(s) { 
            if(!s || s.length < 50) return "https://via.placeholder.com/400x400?text=Paste+Base64+Here";
            // Cleans up if you accidentally pasted CSS tags
            if(s.includes('url(')) return s.split('url(')[1].split(')')[0].replace(/['"]/g, "");
            return s; 
        }

        // Apply images on load
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('hero-img').src = fix(base64_hero);
            document.getElementById('photo1').src = fix(base64_p1);
            document.getElementById('photo2').src = fix(base64_p2);
        });

        // --- CORE LOGIC ---
        function burst() {
            var count = 200;
            var defaults = { origin: { y: 0.7 }, colors: ['#ff4d6d', '#d4af37', '#ffffff'] };
            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }
            fire(0.25, { spread: 40, startVelocity: 70 });
            fire(0.2, { spread: 70 });
            fire(0.35, { spread: 120, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 150, startVelocity: 40, decay: 0.92, scalar: 1.2 });
        }

        function go(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            if(num === 1) {
                document.getElementById('envWrap').classList.remove('open');
                burst();
            }
            if(num === 2) initTree();
        }

        window.onload = () => {
            const container = document.getElementById('bokeh-container');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 60 + 20;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                container.appendChild(p);
                gsap.to(p, { x: "random(-150, 150)", y: "random(-150, 150)", duration: "random(10, 25)", repeat: -1, yoyo: true, ease: "sine.inOut" });
            }

            const tl = gsap.timeline();
            tl.from(".image-circle", { duration: 1.2, scale: 0, rotate: -180, opacity: 0, ease: "back.out(1.2)" })
              .from("#greet", { duration: 0.6, y: 20, opacity: 0 }, "-=0.4")
              .from("#main-title", { 
                  duration: 0.8, y: 30, opacity: 0, ease: "power4.out",
                  onComplete: () => { burst(); setTimeout(burst, 400); }
              }, "-=0.3")
              .from("#sub-text", { duration: 0.6, opacity: 0 }, "-=0.2")
              .from("#start-btn", { duration: 0.8, scale: 0.8, opacity: 0, ease: "elastic.out(1, 0.5)" }, "-=0.1");
        };

        function initTree() {
            const canvas = document.getElementById('treeCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const hearts = [];
            class Heart {
                constructor() { this.reset(); this.y = Math.random() * canvas.height; }
                reset() {
                    this.x = canvas.width / 2;
                    this.y = canvas.height * 0.85;
                    this.size = Math.random() * 7 + 2;
                    this.vx = (Math.random() - 0.5) * 6;
                    this.vy = Math.random() * -4 - 1;
                    this.alpha = 1;
                }
                update() {
                    this.x += this.vx; this.y += this.vy;
                    this.alpha -= 0.007;
                    if(this.alpha <= 0) this.reset();
                }
                draw() {
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = "#ff4d6d";
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            if(hearts.length === 0) for(let i=0; i<100; i++) hearts.push(new Heart());
            function animate() {
                ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                hearts.forEach(h => { h.update(); h.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
