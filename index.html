
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy 34th Birthday Mom</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,900;1,900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #ff4d6d; --bg: #1a0508; --gold: #d4af37; --wine: #4a0e0e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; }

        .page { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .active { opacity: 1; visibility: visible; }

        /* --- PAGE 1: HERO (AUTO BURST) --- */
        #page1 { background: radial-gradient(circle at 50% 30%, #3d0a11 0%, #0d0d0d 100%); }
        .hero-frame { 
            width: 280px; height: 280px; border-radius: 50%; padding: 10px; 
            background: linear-gradient(45deg, var(--gold), transparent, var(--accent)); 
            box-shadow: 0 0 50px rgba(255, 77, 109, 0.4); margin-bottom: 30px; 
            animation: floatHero 6s ease-in-out infinite; z-index: 5;
        }
        .hero-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 4px solid #000; }
        @keyframes floatHero { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* --- PAGE 2: TREE --- */
        #page2 { background: #050505; }
        #treeCanvas { position: absolute; top:0; left:0; width:100%; height:100%; }

        /* --- PAGE 3: LUXURY FINALE (MASSIVE PHOTOS) --- */
        #page3 { background: radial-gradient(circle, #2d0b0e 0%, #1a0508 100%); overflow: hidden; }
        
        .mem-card { 
            position: absolute; 
            width: 380px; height: 480px; 
            background: #fff; padding: 18px 18px 60px 18px; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
            opacity: 0; z-index: 5; border-radius: 2px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .mem-card img { width: 100%; height: 100%; object-fit: cover; }
        .mem-card::after { 
            content: 'Best Memory'; position: absolute; bottom: 15px; left: 0; 
            width: 100%; text-align: center; font-family: 'Dancing Script'; 
            color: #333; font-size: 2.2rem; 
        }
        .mem-card:hover { transform: scale(1.08) !important; z-index: 50 !important; }

        /* LUXURY ENVELOPE */
        .envelope-wrapper { 
            position: relative; width: 400px; height: 280px; 
            cursor: pointer; perspective: 2000px; z-index: 20; 
            margin-top: 120px; transform: scale(1.1);
        }
        .env-back { position: absolute; width: 100%; height: 100%; background: var(--wine); border-radius: 0 0 15px 15px; border: 3px solid var(--gold); box-shadow: 0 40px 80px rgba(0,0,0,0.9); }
        .env-flap { 
            position: absolute; top: 0; width: 0; height: 0; 
            border-left: 200px solid transparent; border-right: 200px solid transparent; 
            border-top: 160px solid #631212; transform-origin: top; 
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 25;
        }
        .env-letter { 
            position: absolute; bottom: 10px; left: 20px; width: 360px; height: 250px; 
            background: #fffdf5; padding: 35px; border-radius: 5px; z-index: 21; 
            transition: 0.8s 0.2s cubic-bezier(0.17, 0.88, 0.32, 1.2); color: #2c0b0b;
        }
        .env-letter h3 { font-family: 'Dancing Script'; font-size: 2.8rem; color: var(--wine); margin: 0; }
        .env-letter p { font-size: 1.3rem; line-height: 1.5; font-weight: 500; margin-top: 15px; }

        .open .env-flap { transform: rotateX(180deg); z-index: 10; }
        .open .env-letter { transform: translateY(-220px) scale(1.1); }

        /* BUTTONS */
        .btn { padding: 18px 50px; background: var(--accent); border: none; color: white; border-radius: 50px; font-weight: 700; cursor: pointer; box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4); z-index: 30; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
        .replay-btn { margin-top: 280px; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 12px 30px; border-radius: 30px; cursor: pointer; z-index: 40; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }
    </style>
</head>

            <button class="btn" onclick="go(3)" style="background:white; color:black; margin-top:40px;">REVEAL SURPRISE →</button>

        const raw_m3  = "PASTE_MEM3_DATA_URI_HERE";

        // Auto-fix function in case of accidental CSS tags
        function fix(s) { 
            if(!s) return "";
            if(s.includes('url(')) return s.split('url(')[1].split(')')[0].replace(/['"]/g, "");
            return s; 
        }

        document.getElementById('mainImg').src = fix(raw_mom);
        document.getElementById('mem1').src = fix(raw_m1);
        document.getElementById('mem2').src = fix(raw_m2);
        document.getElementById('mem3').src = fix(raw_m3);

        function burst() {
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 }, colors: ['#ff4d6d', '#d4af37', '#ffffff'] });
        }

        function go(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            
            if(num === 1) burst();
            if(num === 2) initTree();
            if(num === 3) {
                // Bloom Animation: Starts from center of envelope and fans out
                gsap.set(".mem-card", { opacity: 0, scale: 0.2, x: 0, y: 100, rotation: 0 });

                const tl = gsap.timeline();
                tl.to(".mem-card", { opacity: 1, scale: 1, duration: 1, ease: "power4.out" })
                  .to(".c1", { x: -320, y: -150, rotation: -18, duration: 1.5, ease: "expo.out" }, "-=0.6")
                  .to(".c2", { x: 320, y: -150, rotation: 18, duration: 1.5, ease: "expo.out" }, "-=1.5")
                  .to(".c3", { x: 0, y: -300, rotation: 0, duration: 1.5, ease: "expo.out" }, "-=1.5");

                // Slow, graceful floating
                gsap.to(".mem-card", { y: "+=20", duration: 4, repeat: -1, yoyo: true, ease: "sine.inOut" });
            }
        }

        function initTree() {
            const canvas = document.getElementById('treeCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const hearts = [];
            class Heart {
                constructor() { this.reset(); }
                reset() { this.x = canvas.width/2; this.y = canvas.height*0.8; this.size = Math.random()*6+2; this.vx = (Math.random()-0.5)*5; this.vy = Math.random()*-4-1; this.alpha = 1; }
                update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.007; if(this.alpha <= 0) this.reset(); }
                draw() { ctx.globalAlpha = this.alpha; ctx.fillStyle = "#ff4d6d"; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
            }
            if(hearts.length === 0) for(let i=0; i<80; i++) hearts.push(new Heart());
            function animate() {
                ctx.fillStyle = 'rgba(26, 5, 8, 0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
                hearts.forEach(h => { h.update(); h.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // AUTO-BURST ON START
        window.onload = () => {
            burst();
            setTimeout(burst, 500); // Double burst for impact
        };
    </script>
