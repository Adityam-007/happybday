<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy 34th Birthday Mom</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #ff4d6d; --bg: #0d0d0d; --gold: #d4af37; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; }

        .page {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; text-align: center;
        }
        .active { opacity: 1; visibility: visible; }

        /* PAGE 1 HERO */
        #page1 { background: radial-gradient(circle at 50% 30%, #2c0b0e 0%, #0d0d0d 100%); }
        #bokeh-container { position: absolute; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .particle { position: absolute; background: rgba(255, 77, 109, 0.1); border-radius: 50%; pointer-events: none; }
        
        .image-circle {
            position: relative; width: 250px; height: 250px; border-radius: 50%; padding: 8px;
            background: linear-gradient(45deg, var(--gold), transparent, var(--accent));
            box-shadow: 0 0 40px rgba(255, 77, 109, 0.3); margin-bottom: 30px; z-index: 5;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .image-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 3px solid #000; }

        .shimmer {
            background: linear-gradient(90deg, #d4af37, #fff, #d4af37); background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite; display: block; font-size: 3.5rem;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* PAGE 2 TREE */
        #page2 { background: #050505; }
        #treeCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* PAGE 3 ENVELOPE & MEMORIES */
        #page3 { background: #fff5f6; color: #1a1a1a; overflow: hidden; }
        .memory-card {
            position: absolute; width: 110px; height: 140px; border: 4px solid white;
            border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 2; opacity: 0; object-fit: cover;
        }
        /* Specific positions for mobile */
        .m1 { top: 10%; left: 10%; transform: rotate(-10deg); }
        .m2 { top: 15%; right: 10%; transform: rotate(10deg); }
        .m3 { bottom: 20%; left: 15%; transform: rotate(-5deg); }

        .envelope-container {
            position: relative; width: 280px; height: 180px; cursor: pointer; perspective: 1000px; z-index: 10;
        }
        .env-paper { position: absolute; width: 100%; height: 100%; background: #d44d5c; border-radius: 0 0 10px 10px; z-index: 2; }
        .env-flap {
            position: absolute; top: 0; width: 0; height: 0; border-left: 140px solid transparent;
            border-right: 140px solid transparent; border-top: 100px solid #b83b48;
            transform-origin: top; transition: 0.6s ease-in-out; z-index: 5;
        }
        .letter {
            position: absolute; bottom: 5px; left: 10px; width: 260px; height: 160px;
            background: white; padding: 20px; border-radius: 5px; z-index: 3;
            transition: transform 0.8s 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .envelope-container.open .env-flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-container.open .letter { transform: translateY(-130px); }

        .btn {
            margin-top: 40px; padding: 15px 35px; background: var(--accent); border: none;
            color: white; border-radius: 50px; font-weight: 600; cursor: pointer; z-index: 20;
        }
    </style>
</head>
<body>

    <div class="page active" id="page1">
        <div id="bokeh-container"></div>
        <div class="image-circle">
            <img src="./mom-photo.png" alt="Mom" onerror="this.src='https://via.placeholder.com/300?text=Upload+mom-photo.png'">
        </div>
        <div class="hero-text" style="z-index:10">
            <h2 style="font-family:'Dancing Script'; font-size: 2rem; color: var(--accent);">Dearest Mom</h2>
            <h1 style="font-family:'Playfair Display'; font-size: 3.5rem; margin:0;">HAPPY <span class="shimmer">34th</span></h1>
        </div>
        <button class="btn" onclick="go(2)">THE SURPRISE →</button>
    </div>

    <div class="page" id="page2">
        <canvas id="treeCanvas"></canvas>
        <div style="z-index:10">
            <h2 style="font-family:'Playfair Display'; font-size: 2rem;">The World Got Luckier</h2>
            <p style="color: var(--accent); letter-spacing: 3px;">SINCE MAY 27</p>
            <button class="btn" onclick="go(3)" style="background:white; color:black;">OPEN MY HEART →</button>
        </div>
    </div>

    <div class="page" id="page3">
        <img src="./mem1.jpeg" class="memory-card m1" onerror="this.style.display='none'">
        <img src="./mem2.jpeg" class="memory-card m2" onerror="this.style.display='none'">
        <img src="./mem3.png" class="memory-card m3" onerror="this.style.display='none'">

        <div class="envelope-container" onclick="this.classList.toggle('open')">
            <div class="env-flap"></div>
            <div class="letter">
                <h3 style="font-family:'Dancing Script'; color:var(--accent); margin:0;">Dear Mom,</h3>
                <p style="font-size:0.9rem; color:#444;">You're the heart of our home. May your 34th year be filled with as much love as you give! ❤️</p>
            </div>
            <div class="env-paper"></div>
        </div>
        <p style="margin-top:20px; font-size:0.7rem; color:#888;">TAP TO OPEN</p>
        <button class="btn" onclick="go(1)" style="background:none; color:#333; border:1px solid #333;">REPLAY</button>
    </div>

    <script>
        function burst() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff4d6d', '#d4af37'] });
        }

        function go(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            if(num === 1) { setTimeout(burst, 500); }
            if(num === 2) { initTree(); }
            if(num === 3) { 
                gsap.to(".memory-card", { opacity: 1, duration: 1, stagger: 0.3 }); 
            }
        }

        // Tree Logic
        function initTree() {
            const canvas = document.getElementById('treeCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const hearts = [];
            class Heart {
                constructor() { this.reset(); this.y = Math.random() * canvas.height; }
                reset() { this.x = canvas.width/2; this.y = canvas.height * 0.8; this.size = Math.random()*5+2; this.vx = (Math.random()-0.5)*4; this.vy = Math.random()*-3-1; this.alpha = 1; }
                update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.01; if(this.alpha <= 0) this.reset(); }
                draw() { ctx.globalAlpha = this.alpha; ctx.fillStyle = "#ff4d6d"; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
            }
            for(let i=0; i<70; i++) hearts.push(new Heart());
            function animate() {
                ctx.fillStyle = 'rgba(13, 13, 13, 0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
                hearts.forEach(h => { h.update(); h.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        window.onload = () => {
            burst();
            // Bokeh
            const container = document.getElementById('bokeh-container');
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div'); p.className = 'particle';
                const s = Math.random()*50+20; p.style.width = s+'px'; p.style.height = s+'px';
                p.style.left = Math.random()*100+'vw'; p.style.top = Math.random()*100+'vh';
                container.appendChild(p);
                gsap.to(p, { x: "random(-50,50)", y: "random(-50,50)", duration: 10, repeat:-1, yoyo:true });
            }
        };
    </script>
</body>
</html>
